[world]
world_width = 42 # Preserves the established arena density with one founder per genome.

[population]
num_organisms = 64 # Shared-arena baseline: exactly one founder for each genome in the NEAT pool.

[lifecycle]
starting_energy = 250 # Initial energy budget assigned to every founder.
attack_energy_transfer = 20 # Maximum energy conserved from victim to attacker per successful adjacent attack.
attack_attempt_cost = 1 # One metabolism-tick of energy dissipated by every attack action, including misses and blocked friendly-fire attempts.
action_temperature = 0.08 # Softmax temperature for action sampling; lower values make choices more deterministic.
intent_parallel_threads = 8 # Worker threads used during the intent-evaluation phase.

[terrain]
terrain_noise_scale = 0.01 # Perlin noise input scale for terrain-wall generation.
terrain_threshold = 0.70 # Noise cutoff for turning a cell into impassable wall terrain.

# Flags for running experiments.
[flags]
runtime_plasticity_enabled = false # Whether runtime Hebbian plasticity updates are applied after each tick.
leaky_neurons_enabled = false # Whether feed-forward hidden units also retain explicit leaky state across ticks.
predation_enabled = true # Enables dissipative adjacent energy theft.
force_random_actions = false # Debug toggle that ignores policy logits and forces random actions.
