[world]
world_width = 250 # Toroidal world width used for both axial dimensions of the hex grid.

[population]
num_organisms = 2000 # Target number of organisms to place when seeding the initial population.
periodic_injection_interval_turns = 100 # Turn cadence for periodic seed-genome injection attempts.
periodic_injection_count = 200 # Fresh seed-genome spawn attempts to make on each periodic injection.

[lifecycle]
passive_metabolism_cost_per_unit = 0.005 # Passive energy drain per brain/vision complexity unit each tick.
move_action_energy_cost = 1.0 # Flat energy cost charged for any non-idle action.
action_temperature = 0.08 # Softmax temperature for action sampling; lower values make choices more deterministic.
intent_parallel_threads = 8 # Worker threads used during the intent-evaluation phase.

[food]
food_energy = 400 # Energy stored in each plant food item before consumption multipliers are applied.
food_regrowth_interval = 200 # Base turns before an eaten food tile becomes eligible to regrow.
food_regrowth_jitter = 50 # Random plus/minus variation added to the base food regrowth delay.
food_fertility_threshold = 0.6 # Binary fertility cutoff after deterministic jitter.
food_fertility_jitter_strength = 5.0 # Scales the per-tile fertility jitter; higher values punch more holes inside broad fertile zones.

[terrain]
terrain_noise_scale = 0.01 # Perlin noise input scale for terrain-wall generation.
terrain_threshold = 0.70 # Noise cutoff for turning a cell into impassable wall terrain.
spike_density = 0.10 # Fraction of non-wall cells that become damaging spike tiles.

[evolution]
global_mutation_rate_modifier = 1.0 # Global multiplier applied to genome mutation-rate genes during offspring mutation.

# Flags for running experiments.
[flags]
meta_mutation_enabled = true # Whether mutation-rate genes themselves are allowed to mutate.
runtime_plasticity_enabled = true # Whether runtime Hebbian plasticity updates are applied after each tick.
force_random_actions = false # Debug toggle that ignores policy logits and forces random actions.
