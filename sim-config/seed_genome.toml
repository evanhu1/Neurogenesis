# Topology
num_neurons = 0 # Number of inter neurons in the initial seed genome.
num_synapses = 10 # Number of synaptic connections in the initial seed genome.
vision_distance = 5 # Maximum ray-sensing distance for RGB `VisionRay` sensory neurons. Clamped to 10.

# Lifecycle
age_of_maturity = 50 # Age in turns at which organisms count as mature.
gestation_ticks = 2 # Gestation duration in ticks used to determine offspring transfer energy.
max_organism_age = 1000 # Lifespan cap in turns for organisms using this genome.

# Plasticity
hebb_eta_gain = 0.02 # Base Hebbian learning-rate gain used for mature organisms.
juvenile_eta_scale = 2.0 # Multiplier applied to `hebb_eta_gain` before maturity.
eligibility_retention = 0.95 # Exponential retention factor for eligibility traces across ticks.
max_weight_delta_per_tick = 0.05 # Per-tick clamp on how much a synapse weight can change from plasticity.
synapse_prune_threshold = 0.05 # Minimum absolute weight and eligibility scale required to keep a mature synapse during pruning.

# Mutation rates
# Note: a rate set to exactly 0.0 is absorbing — it is exempt from
# meta-mutation and hard-disables that operator for the entire lineage.
mutation_rate_age_of_maturity = 0.1 # Probability of mutating `age_of_maturity` during offspring generation.
mutation_rate_gestation_ticks = 0.1 # Probability of mutating `gestation_ticks` during offspring generation.
mutation_rate_max_organism_age = 0.1 # Probability of mutating `max_organism_age` during offspring generation.
mutation_rate_vision_distance = 0.1 # Probability of mutating `vision_distance` during offspring generation.
mutation_rate_hebb_eta_gain = 0.05 # Probability of mutating `hebb_eta_gain`.
mutation_rate_juvenile_eta_scale = 0.05 # Probability of mutating `juvenile_eta_scale`.
mutation_rate_inter_bias = 0.1 # Probability of perturbing an inter-neuron bias.
mutation_rate_inter_update_rate = 0.1 # Probability of mutating an inter-neuron update-rate / time-constant gene.
mutation_rate_eligibility_retention = 0.1 # Probability of mutating `eligibility_retention`.
mutation_rate_synapse_prune_threshold = 0.05 # Probability of mutating `synapse_prune_threshold`.
mutation_rate_synapse_weight_perturbation = 0.5 # Probability of perturbing or replacing an existing synapse weight.
mutation_rate_add_synapse = 0.1 # Probability of adding a new synapse.
mutation_rate_remove_synapse = 0.1 # Probability of removing an existing synapse.
mutation_rate_remove_neuron = 0.05 # Probability of removing an inter neuron.
mutation_rate_add_neuron_split_edge = 0.1 # Probability of splitting an edge to insert a new inter neuron.
mutation_rate_max_weight_delta_per_tick = 0.1 # Probability of multiplicatively perturbing `max_weight_delta_per_tick`.
