[world]
world_width = 250

[population]
num_organisms = 5000
periodic_injection_interval_turns = 100
periodic_injection_count = 200

[lifecycle]
passive_metabolism_cost_per_unit = 0.005
body_mass_metabolic_cost_coeff = 1.0
move_action_energy_cost = 1.0
action_temperature = 0.08
intent_parallel_threads = 8

[food]
food_energy = 20
food_regrowth_interval = 200
food_regrowth_jitter = 50
food_tile_fraction = 0.4

[terrain]
terrain_noise_scale = 0.01
terrain_threshold = 0.70

[evolution]
global_mutation_rate_modifier = 1.0
reproduction_mode = "asexual"
founder_genome_mode = "independent"
founder_diversification_rounds = 1
crossover_scope = "full_genome"
crossover_strategy = "uniform"
crossover_probability = 1.0
mate_compatibility_threshold = 1.0

# Flags for running experiments.
[flags]
meta_mutation_enabled = true
runtime_plasticity_enabled = true
leaky_neurons_enabled = false
predation_enabled = false
force_random_actions = false
