[world]
world_width = 100 # Toroidal world width used for both axial dimensions of the hex grid.

[population]
num_organisms = 500 # Target number of organisms to place when seeding the initial population.

[lifecycle]
passive_metabolism_cost_per_unit = 0.005 # Passive energy drain per neuron/vision unit plus spatial wiring distance cost each tick.
body_mass_metabolic_cost_coeff = 1.0 # Kleiber-style body-mass metabolic cost; body_units = coeff * max_health^0.75 added to base metabolic cost.
move_action_energy_cost = 1.0 # Flat energy cost charged for any non-idle action.
action_temperature = 0.08 # Softmax temperature for action sampling; lower values make choices more deterministic.
intent_parallel_threads = 8 # Worker threads used during the intent-evaluation phase.

[food]
food_energy = 20 # Energy a plant yields when eaten (transferred in full; no digestion multiplier).
food_regrowth_interval = 200 # Base turns before an eaten food tile becomes eligible to regrow.
food_regrowth_jitter = 50 # Random plus/minus variation added to the base food regrowth delay.
food_tile_fraction = 0.4 # Exact fraction of non-wall cells selected as persistent plant tiles by a deterministic random ranking.

[terrain]
terrain_noise_scale = 0.01 # Perlin noise input scale for terrain-wall generation.
terrain_threshold = 0.70 # Noise cutoff for turning a cell into impassable wall terrain.

# Flags for running experiments.
[flags]
runtime_plasticity_enabled = false # Whether runtime Hebbian plasticity updates are applied after each tick.
leaky_neurons_enabled = false # Whether hidden neurons retain leaky recurrent state instead of using instantaneous NEAT activations.
predation_enabled = false # Enables organism vision, the Health sensor, Attack actions, and predation damage.
force_random_actions = false # Debug toggle that ignores policy logits and forces random actions.
protocol_cache_enabled = false # Enables the persistent nonblocking public energy-cache overlay.

[artifact]
cache_energy_fraction = 0.35 # Fraction of consumed plant energy transferred into a public cache when enabled.
cache_release_efficiency = 1.0 # Fraction of accepted cache energy credited to the opener; the remainder is explicit loss.
protocol_interaction_energy_cost = 0.0 # Energy charged for each queued public protocol response.
