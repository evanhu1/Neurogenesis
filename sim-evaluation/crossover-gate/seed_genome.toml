# Small homologous sensor-to-action founder graph. Only neural parameters and
# graph structure mutate in this experiment; life history and frozen
# plasticity genes cannot provide an alternate optimization path.

# Topology
num_neurons = 0
num_synapses = 10
vision_distance = 5

# Lifecycle
age_of_maturity = 25
gestation_ticks = 0
max_organism_age = 750

# Plasticity (present in the genome, disabled at runtime and mutation-frozen)
hebb_eta_gain = 0.02
juvenile_eta_scale = 2.0
eligibility_retention = 0.90
max_weight_delta_per_tick = 0.05
synapse_prune_threshold = 0.05

# Frozen non-brain mutation rates
mutation_rate_age_of_maturity = 0.0
mutation_rate_gestation_ticks = 0.0
mutation_rate_max_organism_age = 0.0
mutation_rate_vision_distance = 0.0
mutation_rate_hebb_eta_gain = 0.0
mutation_rate_juvenile_eta_scale = 0.0
mutation_rate_eligibility_retention = 0.0
mutation_rate_synapse_prune_threshold = 0.0
mutation_rate_max_weight_delta_per_tick = 0.0

# Neural mutation rates
mutation_rate_inter_bias = 0.1
mutation_rate_inter_update_rate = 0.1
mutation_rate_synapse_weight_perturbation = 0.5
mutation_rate_add_synapse = 0.1
mutation_rate_remove_synapse = 0.1
mutation_rate_remove_neuron = 0.05
mutation_rate_add_neuron_split_edge = 0.1
